<ng-container *ngIf="vm$ | async as vm">
  <mat-card class="profile-card" class="full">
    <mat-card-header>
      <mat-card-title>User #{{ vm.id }}</mat-card-title>
      <mat-card-subtitle>{{ vm.email }}</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <p>Joined: {{ vm.createdAt | date }}</p>
      <p>Role: {{ vm.roleName }}</p>
    </mat-card-content>

    <mat-card-actions>
      <button mat-button color="primary">Edit</button>
      <button (click)="onLogout()" mat-button color="warn">Logout</button>
    </mat-card-actions>
  </mat-card>
</ng-container>
