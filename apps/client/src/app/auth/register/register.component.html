<mat-card>
  <h2>Register</h2>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <mat-form-field appearance="outline" class="full">
      <mat-label>Email</mat-label>
      <input data-test="email-input" matInput formControlName="email" />

      @if (email().hasError("required")) {
        <mat-error>Email is required</mat-error>
      }

      @if (email().dirty && email().hasError("email")) {
        <mat-error>Email is invalid</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Password</mat-label>
      <input matInput type="password" formControlName="password" />

      @if (password().hasError("required")) {
        <mat-error>Password is required</mat-error>
      }

      @if (password().dirty && password().hasError("minlength")) {
        <mat-error> Minimum 6 characters </mat-error>
      }
    </mat-form-field>

    <button
      data-test="submit-btn"
      mat-raised-button
      color="primary"
      type="submit"
      [disabled]="form.invalid"
    >
      Register
    </button>
  </form>
</mat-card>
