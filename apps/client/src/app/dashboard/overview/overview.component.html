<ng-container *ngIf="vm$ | async as vm">
  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ vm.firstName || vm.email }}</mat-card-title>
      <mat-card-subtitle>Welcome back!</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <p class="subtext">
        You’re logged in as <strong>{{ vm.roleName }}</strong
        >.
      </p>
    </mat-card-content>
  </mat-card>
</ng-container>
