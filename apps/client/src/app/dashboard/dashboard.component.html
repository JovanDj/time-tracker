<mat-sidenav-container class="layout-container" *ngIf="vm$ | async as vm">
  <mat-sidenav mode="side" opened class="sidebar">
    <div class="brand">
      <mat-icon>track_changes</mat-icon>
      <span>Time Tracker</span>
    </div>

    <mat-nav-list>
      <a mat-list-item [routerLink]="['/dashboard']">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>

      <a mat-list-item [routerLink]="['/dashboard', 'profile']">
        <mat-icon matListItemIcon>person</mat-icon>
        <span matListItemTitle>Profile</span>
      </a>

      <ng-container *ngIf="vm.roleName === 'admin'">
        <mat-divider></mat-divider>

        <a mat-list-item [routerLink]="['/dashboard', 'users']">
          <mat-icon matListItemIcon>group</mat-icon>
          <span matListItemTitle>Users</span>
        </a>
      </ng-container>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="navbar">
      <span class="breadcrumb">Dashboard</span>

      <button mat-button [matMenuTriggerFor]="userMenu">
        <mat-icon>account_circle</mat-icon>
        {{ vm.email }}
      </button>
      <mat-menu #userMenu="matMenu">
        <button mat-menu-item [routerLink]="['/dashboard', 'profile']">
          <mat-icon>person</mat-icon>
          Profile
        </button>
        <button mat-menu-item (click)="onLogout()">
          <mat-icon color="warn">logout</mat-icon>
          Logout
        </button>
      </mat-menu>
    </mat-toolbar>

    <div class="dashboard-content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
